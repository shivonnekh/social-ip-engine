                - /url: "#events"
                - generic [ref=e51]: Events
                - img [ref=e53]: 
            - paragraph [ref=e54]: "We've events for most resources in our API. Some of the common events are:"
            - list [ref=e55]:
              - listitem [ref=e56]:
                - text: New messages (
                - code [ref=e57]: message-insert
                - text: )
                - list [ref=e58]:
                  - listitem [ref=e59]: a message was sent or received
              - listitem [ref=e60]:
                - text: Message updates
                - list [ref=e61]:
                  - listitem [ref=e62]:
                    - text: delivered, read, failed etc. (
                    - code [ref=e63]: message-update
                    - text: )
              - listitem [ref=e64]:
                - text: Channel (account) updates (
                - code [ref=e65]: account-update
                - text: )
                - list [ref=e66]:
                  - listitem [ref=e67]: account status changes (open, close, etc.)
            - paragraph [ref=e68]:
              - text: This list is not exhaustive, you can find the complete list of events
              - link "here" [ref=e69] [cursor=pointer]:
                - /url: https://chatdaddy.stoplight.io/docs/openapi/29bf3de72db6b-event-name
            - paragraph [ref=e70]:
              - text: Each event name is fairly self-explanatory & most events are built on the idea of CRUD operations on the respective resources. For example, to listen to events about the
              - link "Contact" [ref=e71] [cursor=pointer]:
                - /url: https://chatdaddy.stoplight.io/docs/openapi/5b34eda12cef6-contact
              - text: "resource in our API, the corresponding events:"
            - list [ref=e72]:
              - listitem [ref=e73]:
                - code [ref=e74]: contact-insert
                - text: will be triggered when a new contact is created
              - listitem [ref=e75]:
                - code [ref=e76]: contact-update
                - text: will be triggered when a contact is updated
              - listitem [ref=e77]:
                - code [ref=e78]: contact-delete
                - text: will be triggered when a contact is deleted
            - heading "Registering a Webhook" [level=2] [ref=e79]:
              - link "Registering a Webhook" [ref=e80] [cursor=pointer]:
                - /url: "#registering-a-webhook"
                - generic [ref=e81]: Registering a Webhook
                - img [ref=e83]: 
            - paragraph [ref=e84]:
              - text: You can either register a webhook via the ChatDaddy dashboard or via
              - link "the API" [ref=e85] [cursor=pointer]:
                - /url: https://chatdaddy.stoplight.io/docs/openapi/3c25e1f30f589-create-a-webhook-subscription
              - text: . A webhook can be registered for one or more events.
            - paragraph [ref=e86]: "To register a webhook via the dashboard:"
            - list [ref=e87]:
              - listitem [ref=e88]:
                - text: Go to the
                - link "Webhooks page" [ref=e89] [cursor=pointer]:
