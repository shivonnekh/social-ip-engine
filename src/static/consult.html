<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>心宜中醫 · 語音診症</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #3ecf8e;
    --red:   #f04444;
    --text:  #e8edf2;
    --muted: rgba(255,255,255,0.5);
  }

  html, body {
    height: 100%; width: 100%;
    background: #0d1117;
    overflow: hidden;
    font-family: -apple-system, "PingFang HK", sans-serif;
    color: var(--text);
    touch-action: manipulation;
  }

  /* ── Full-screen Chloe "video" ── */
  #callScreen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 50% 40%, #0e2a1c 0%, #0d1117 70%);
  }

  #chloeAvatar {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1e7c56 0%, #2db67d 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 64px;
    font-weight: 700;
    color: white;
    letter-spacing: -2px;
    transition: box-shadow 0.3s;
    position: relative;
    z-index: 1;
  }
  #chloeAvatar.speaking {
    animation: speakRing 1.4s ease-in-out infinite;
  }
  @keyframes speakRing {
    0%, 100% { box-shadow: 0 0 0 0   rgba(62,207,142,0), 0 0 0 0   rgba(62,207,142,0); }
    50%       { box-shadow: 0 0 0 18px rgba(62,207,142,0.2), 0 0 0 36px rgba(62,207,142,0.07); }
  }

  /* Name + status over avatar */
  #chloeInfo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, calc(-50% + 110px));
    text-align: center;
    z-index: 2;
  }
  #chloeName  { font-size: 20px; font-weight: 600; }
  #chloeTitle { font-size: 13px; color: var(--muted); margin-top: 3px; }

  /* Subtitle — what Chloe just said */
  #subtitle {
    position: fixed;
    bottom: 130px;
    left: 20px; right: 20px;
    text-align: center;
    font-size: 15px;
    line-height: 1.55;
    color: white;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 10;
    max-height: 80px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }
  #subtitle.show { opacity: 1; }

  /* Status pill */
  #statusPill {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 999px;
    font-weight: 500;
    z-index: 20;
    backdrop-filter: blur(8px);
    transition: background 0.3s, color 0.3s;
  }
  #statusPill.idle       { background: rgba(255,255,255,0.1); color: var(--muted); }
  #statusPill.listening  { background: rgba(240,68,68,0.25);  color: #ff8080; }
  #statusPill.thinking   { background: rgba(240,168,68,0.2);  color: #f0c060; }
  #statusPill.speaking   { background: rgba(62,207,142,0.2);  color: var(--green); }
  #statusPill.error      { background: rgba(240,68,68,0.2);   color: var(--red); }
  #statusPill.conn       { background: rgba(240,168,68,0.15); color: #f0c060; }

  /* Mic level wave (shown during recording) */
  #micWave {
    position: fixed;
    bottom: 175px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 24px;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 10;
  }
  #micWave.show { opacity: 1; }
  #micWave span {
    width: 3px;
    border-radius: 2px;
    background: var(--red);
    animation: waveBounce 0.8s ease-in-out infinite;
    transform-origin: bottom;
  }
  #micWave span:nth-child(1) { height: 8px;  animation-delay: 0s; }
  #micWave span:nth-child(2) { height: 18px; animation-delay: 0.1s; }
  #micWave span:nth-child(3) { height: 24px; animation-delay: 0.2s; }
  #micWave span:nth-child(4) { height: 14px; animation-delay: 0.15s; }
  #micWave span:nth-child(5) { height: 8px;  animation-delay: 0.05s; }
  @keyframes waveBounce {
    0%, 100% { transform: scaleY(0.4); }
    50%       { transform: scaleY(1); }
  }

  /* ── Self view PiP ── */
  #selfView {
    position: fixed;
    bottom: 130px;
    right: 16px;
    width: 90px;
    height: 126px;
    border-radius: 14px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.15);
    background: #1a2232;
    z-index: 30;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
  #selfVideo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }
  #selfLabel {
    position: absolute;
    bottom: 4px;
    left: 0; right: 0;
    text-align: center;
    font-size: 9px;
    color: rgba(255,255,255,0.55);
  }

  /* ── Call controls bar ── */
  #controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
    z-index: 20;
  }

  .ctrl-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }
  .ctrl-btn {
    width: 54px; height: 54px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: none;
    transition: transform 0.12s, opacity 0.15s;
  }
  .ctrl-btn:active { transform: scale(0.9); }
  .ctrl-lbl { font-size: 11px; color: var(--muted); }

  #btnPTT {
    width: 68px; height: 68px;
    font-size: 24px;
    background: var(--green);
    color: white;
    box-shadow: 0 0 0 0 rgba(62,207,142,0);
    transition: transform 0.12s, background 0.12s, box-shadow 0.15s;
  }
  #btnPTT.recording {
    background: var(--red);
    transform: scale(1.08);
    box-shadow: 0 0 0 14px rgba(240,68,68,0.2);
  }
  #btnPTT:disabled {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.3);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .ctrl-btn.side {
    background: rgba(255,255,255,0.12);
    color: white;
  }
  .ctrl-btn.side.off { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.3); }
</style>
</head>
<body>

<!-- Full-screen Chloe -->
<div id="callScreen">
  <div id="chloeAvatar">陳</div>
  <div id="chloeInfo">
    <div id="chloeName">Chloe 陳</div>
    <div id="chloeTitle">心宜中醫 AI 助理</div>
  </div>
</div>

<!-- Status pill -->
<div id="statusPill" class="conn">連接中…</div>

<!-- Chloe subtitle -->
<div id="subtitle"></div>

<!-- Mic wave (recording indicator) -->
<div id="micWave">
  <span></span><span></span><span></span><span></span><span></span>
</div>

<!-- Patient self-view -->
<div id="selfView">
  <video id="selfVideo" autoplay playsinline muted></video>
  <div id="selfLabel">你</div>
</div>

<!-- Call controls -->
<div id="controls">
  <div class="ctrl-wrap">
    <button id="btnMic" class="ctrl-btn side" onclick="toggleMic()">🎙️</button>
    <div class="ctrl-lbl">靜音</div>
  </div>
  <div class="ctrl-wrap">
    <button id="btnPTT" disabled>🎤</button>
    <div class="ctrl-lbl" id="pttLbl">按住說話</div>
  </div>
  <div class="ctrl-wrap">
    <button id="btnCam" class="ctrl-btn side" onclick="toggleCam()">📷</button>
    <div class="ctrl-lbl">鏡頭</div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// Config
// ─────────────────────────────────────────────
const pathParts = window.location.pathname.split('/').filter(Boolean);
const ROOM_ID   = pathParts[pathParts.length - 1];
const wsProto   = location.protocol === 'https:' ? 'wss:' : 'ws:';
const WS_URL    = `${wsProto}//${location.host}/ws/voice/${ROOM_ID}`;

// ─────────────────────────────────────────────
// DOM
// ─────────────────────────────────────────────
const statusPill  = document.getElementById('statusPill');
const subtitle    = document.getElementById('subtitle');
const chloeAvatar = document.getElementById('chloeAvatar');
const micWave     = document.getElementById('micWave');
const btnPTT      = document.getElementById('btnPTT');
const btnMic      = document.getElementById('btnMic');
const btnCam      = document.getElementById('btnCam');
const pttLbl      = document.getElementById('pttLbl');
const selfVideo   = document.getElementById('selfVideo');

// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let ws            = null;
let mediaRecorder = null;
let audioChunks   = [];
let isRecording   = false;
let micEnabled    = true;
let camEnabled    = true;
let micStream     = null;
let videoStream   = null;
let subtitleTimer = null;

// ─────────────────────────────────────────────
// WebSocket
// ─────────────────────────────────────────────
function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen  = () => setStatus('conn', '連接中…');
  ws.onmessage = async ({ data }) => {
    let msg; try { msg = JSON.parse(data); } catch { return; }
    switch (msg.type) {
      case 'ready':
        setStatus('idle', '已連線');
        btnPTT.disabled = false;
        break;
      case 'status':
        if (msg.text.includes('聽')) setStatus('listening', msg.text);
        else if (msg.text.includes('諗')) setStatus('thinking', msg.text);
        else if (msg.text.includes('回')) setStatus('speaking', msg.text);
        break;
      case 'transcript':
        setStatus('listening', '收到：' + msg.text.slice(0, 20) + (msg.text.length > 20 ? '…' : ''));
        break;
      case 'response':
        setStatus('idle', '已連線');
        showSubtitle(msg.text);
        if (msg.audio_b64) await playAudio(msg.audio_b64);
        btnPTT.disabled = false;
        break;
      case 'error':
        setStatus('error', msg.text);
        btnPTT.disabled = false;
        setTimeout(() => setStatus('idle', '已連線'), 3000);
        break;
    }
  };
  ws.onerror  = () => setStatus('error', '連線錯誤');
  ws.onclose  = () => { setStatus('conn', '重新連接…'); btnPTT.disabled = true; setTimeout(connect, 3000); };
}

// ─────────────────────────────────────────────
// Media setup
// ─────────────────────────────────────────────
async function setupMedia() {
  try {
    const full = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
    micStream   = new MediaStream(full.getAudioTracks());
    videoStream = new MediaStream(full.getVideoTracks());
    selfVideo.srcObject = videoStream;
  } catch {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      document.getElementById('selfView').style.display = 'none';
    } catch { setStatus('error', '無法開啟麥克風'); }
  }
}

// ─────────────────────────────────────────────
// Push-to-talk
// ─────────────────────────────────────────────
function startRecording() {
  if (isRecording || !micStream || btnPTT.disabled) return;
  isRecording = true;
  audioChunks = [];
  btnPTT.classList.add('recording');
  btnPTT.textContent = '🔴';
  pttLbl.textContent = '錄音中…';
  micWave.classList.add('show');

  const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
    ? 'audio/webm;codecs=opus' : 'audio/webm';
  mediaRecorder = new MediaRecorder(micStream, { mimeType });
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = sendAudio;
  mediaRecorder.start(100);
}

function stopRecording() {
  if (!isRecording) return;
  isRecording = false;
  btnPTT.classList.remove('recording');
  btnPTT.textContent = '🎤';
  pttLbl.textContent = '處理中…';
  micWave.classList.remove('show');
  mediaRecorder?.stop();
  btnPTT.disabled = true;
}

async function sendAudio() {
  if (!audioChunks.length) { resetPTT(); return; }
  const blob   = new Blob(audioChunks, { type: 'audio/webm' });
  const buffer = await blob.arrayBuffer();
  if (ws?.readyState === WebSocket.OPEN) ws.send(buffer);
  audioChunks = [];
}

function resetPTT() {
  pttLbl.textContent = '按住說話';
  btnPTT.disabled    = false;
}

// ─────────────────────────────────────────────
// Audio playback
// ─────────────────────────────────────────────
async function playAudio(b64) {
  chloeAvatar.classList.add('speaking');
  try {
    const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const blob  = new Blob([bytes], { type: 'audio/mpeg' });
    const url   = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.onended = () => { URL.revokeObjectURL(url); chloeAvatar.classList.remove('speaking'); resetPTT(); };
    await audio.play();
  } catch { chloeAvatar.classList.remove('speaking'); resetPTT(); }
}

// ─────────────────────────────────────────────
// Subtitle (fades after 6s)
// ─────────────────────────────────────────────
function showSubtitle(text) {
  subtitle.textContent = text;
  subtitle.classList.add('show');
  clearTimeout(subtitleTimer);
  subtitleTimer = setTimeout(() => subtitle.classList.remove('show'), 6000);
}

// ─────────────────────────────────────────────
// Status pill
// ─────────────────────────────────────────────
function setStatus(cls, text) {
  statusPill.className = cls;
  statusPill.textContent = text;
}

// ─────────────────────────────────────────────
// Mic / cam toggles
// ─────────────────────────────────────────────
function toggleMic() {
  micEnabled = !micEnabled;
  micStream?.getAudioTracks().forEach(t => { t.enabled = micEnabled; });
  btnMic.textContent = micEnabled ? '🎙️' : '🔇';
  btnMic.classList.toggle('off', !micEnabled);
}

function toggleCam() {
  camEnabled = !camEnabled;
  videoStream?.getVideoTracks().forEach(t => { t.enabled = camEnabled; });
  btnCam.textContent = camEnabled ? '📷' : '🚫';
  btnCam.classList.toggle('off', !camEnabled);
  document.getElementById('selfView').style.opacity = camEnabled ? '1' : '0.3';
}

// ─────────────────────────────────────────────
// PTT event bindings
// ─────────────────────────────────────────────
btnPTT.addEventListener('mousedown',  e => { e.preventDefault(); startRecording(); });
btnPTT.addEventListener('mouseup',    e => { e.preventDefault(); stopRecording(); });
btnPTT.addEventListener('mouseleave', () => { if (isRecording) stopRecording(); });
btnPTT.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); }, { passive: false });
btnPTT.addEventListener('touchend',   e => { e.preventDefault(); stopRecording(); },  { passive: false });

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
(async () => { await setupMedia(); connect(); })();
</script>
</body>
</html>
