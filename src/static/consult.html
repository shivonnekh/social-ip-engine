<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>心宜中醫 · 視頻診症</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; width: 100%;
    background: #0b0f0c;
    overflow: hidden;
    font-family: -apple-system, "PingFang HK", sans-serif;
    color: #e8edf2;
    touch-action: manipulation;
  }

  /* ── Chloe full-screen photo "video" ── */
  #chloeVideo {
    position: fixed;
    inset: 0;
    overflow: hidden;
    background: #0b0f0c;
  }
  #chloeImg {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 18%;
    display: block;
    transition: filter 0.4s;
  }
  /* Dim slightly while thinking */
  #chloeVideo.thinking #chloeImg { filter: brightness(0.88); }
  /* Green glow border when Chloe speaks */
  #chloeVideo::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    border-radius: 0;
    opacity: 0;
    transition: opacity 0.3s;
    box-shadow: inset 0 0 60px rgba(62,207,142,0.35), inset 0 0 20px rgba(62,207,142,0.2);
  }
  #chloeVideo.speaking::after {
    opacity: 1;
    animation: speakPulse 1.3s ease-in-out infinite;
  }
  @keyframes speakPulse {
    0%, 100% { box-shadow: inset 0 0 50px rgba(62,207,142,0.25), inset 0 0 15px rgba(62,207,142,0.15); }
    50%       { box-shadow: inset 0 0 90px rgba(62,207,142,0.45), inset 0 0 30px rgba(62,207,142,0.3); }
  }
  /* Name tag overlay */
  #chloeName {
    position: absolute;
    bottom: 100px;
    left: 20px;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(6px);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    pointer-events: none;
    z-index: 5;
  }
  #chloeName span { font-size: 11px; font-weight: 400; color: rgba(255,255,255,0.55); margin-left: 6px; }

  /* ── Status pill ── */
  #statusPill {
    position: fixed;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 999px;
    font-weight: 500;
    z-index: 20;
    backdrop-filter: blur(8px);
    transition: background 0.3s, color 0.3s;
    white-space: nowrap;
  }
  .s-conn      { background: rgba(240,168,68,0.2); color: #f0c060; }
  .s-idle      { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
  .s-listening { background: rgba(62,207,142,0.2);  color: #3ecf8e; }
  .s-thinking  { background: rgba(240,168,68,0.2);  color: #f0c060; }
  .s-speaking  { background: rgba(62,207,142,0.25); color: #3ecf8e; }
  .s-error     { background: rgba(240,68,68,0.2);   color: #f04444; }

  /* ── Subtitle ── */
  #subtitle {
    position: fixed;
    bottom: 120px; left: 32px; right: 32px;
    text-align: center;
    font-size: 18px; font-weight: 500; line-height: 1.55;
    color: white;
    text-shadow: 0 1px 6px rgba(0,0,0,1), 0 0 12px rgba(0,0,0,0.9);
    opacity: 0;
    transition: opacity 0.25s;
    z-index: 20;
    pointer-events: none;
  }
  #subtitle.show { opacity: 1; }
  /* User's own speech transcript — dimmer, smaller */
  #subtitle.user-speech {
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    font-style: italic;
    font-weight: 400;
  }

  /* ── Listening indicator (wave) ── */
  #listenWave {
    position: fixed;
    bottom: 105px; left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: flex-end; gap: 3px;
    height: 20px; opacity: 0;
    transition: opacity 0.3s;
    z-index: 20;
  }
  #listenWave.show { opacity: 1; }
  #listenWave span {
    width: 3px; border-radius: 2px;
    background: #3ecf8e;
    animation: waveBounce 0.9s ease-in-out infinite;
    transform-origin: bottom;
  }
  #listenWave span:nth-child(1) { height: 7px; animation-delay: 0s; }
  #listenWave span:nth-child(2) { height: 15px; animation-delay: 0.12s; }
  #listenWave span:nth-child(3) { height: 20px; animation-delay: 0.22s; }
  #listenWave span:nth-child(4) { height: 13px; animation-delay: 0.14s; }
  #listenWave span:nth-child(5) { height: 7px; animation-delay: 0.04s; }
  @keyframes waveBounce {
    0%, 100% { transform: scaleY(0.35); }
    50%       { transform: scaleY(1); }
  }

  /* ── Patient self PiP ── */
  #selfView {
    position: fixed;
    bottom: 100px; right: 14px;
    width: 88px; height: 120px;
    border-radius: 14px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.14);
    background: #1a2232;
    z-index: 30;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
  #selfVideo { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  #selfLabel {
    position: absolute; bottom: 3px; left: 0; right: 0;
    text-align: center; font-size: 9px;
    color: rgba(255,255,255,0.55);
  }

  /* ── Controls ── */
  #controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 92px;
    display: flex; align-items: center; justify-content: center; gap: 24px;
    background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
    z-index: 20;
  }
  .ctrl-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .ctrl-btn {
    width: 52px; height: 52px; border-radius: 50%; border: none;
    cursor: pointer; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.12); color: white;
    transition: transform 0.12s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active { transform: scale(0.88); }
  .ctrl-btn.off { background: rgba(240,68,68,0.3); }
  .ctrl-lbl { font-size: 11px; color: rgba(255,255,255,0.5); }
</style>
</head>
<body>

<!-- Welcome splash — shown before call starts -->
<div id="welcomeSplash" style="
  position:fixed;inset:0;z-index:999;
  background:linear-gradient(160deg,#0b1a13 0%,#0f2a1a 60%,#071209 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:24px;padding:40px;text-align:center;
">
  <div style="font-size:56px;margin-bottom:4px">🌿</div>
  <div style="font-size:22px;font-weight:700;color:#e8f5ee;letter-spacing:.5px">
    恭喜你已接通
  </div>
  <div style="font-size:28px;font-weight:700;color:#3ecf8e;letter-spacing:1px">
    陳芷晴中醫師
  </div>
  <div style="font-size:14px;color:rgba(255,255,255,0.5);max-width:280px;line-height:1.7">
    AI 視頻診症助理<br>請點擊下方按鈕接通，<br>並允許使用麥克風及鏡頭
  </div>
  <button onclick="startCall()" style="
    margin-top:8px;padding:16px 48px;
    background:linear-gradient(135deg,#3ecf8e,#2ba86e);
    border:none;border-radius:999px;
    color:#fff;font-size:18px;font-weight:700;
    cursor:pointer;letter-spacing:.5px;
    box-shadow:0 4px 24px rgba(62,207,142,0.4);
  ">接通診症</button>
</div>

<!-- Chloe "video" -->
<div id="chloeVideo">
  <img id="chloeImg" src="/static/chloe.jpg" alt="Chloe">
  <div id="chloeName">陳芷晴中醫師<span>AI 視頻診症助理</span></div>
</div>

<!-- Status -->
<div id="statusPill" class="s-conn">連接中…</div>

<!-- Subtitle -->
<div id="subtitle"></div>

<!-- Debug panel (tap to toggle) -->
<div id="debugPanel" onclick="this.classList.toggle('open')" style="
  position:fixed;top:60px;right:8px;z-index:999;
  background:rgba(0,0,0,0.82);color:#0f0;font:11px/1.5 monospace;
  border-radius:8px;padding:6px 10px;max-width:280px;cursor:pointer;
  max-height:36px;overflow:hidden;transition:max-height .3s;
">⚙ debug</div>
<style>
  #debugPanel.open { max-height:320px; overflow-y:auto; }
</style>

<!-- Listening wave -->
<div id="listenWave">
  <span></span><span></span><span></span><span></span><span></span>
</div>

<!-- Patient PiP -->
<div id="selfView">
  <video id="selfVideo" autoplay playsinline muted></video>
  <div id="selfLabel">你</div>
</div>

<!-- Hidden canvas for vision frame capture — 320×240 JPEG -->
<canvas id="captureCanvas" width="320" height="240" style="display:none"></canvas>

<!-- Controls -->
<div id="controls">
  <div class="ctrl-wrap">
    <button id="btnMic" class="ctrl-btn" onclick="toggleMic()">🎙️</button>
    <div class="ctrl-lbl">靜音</div>
  </div>
  <div class="ctrl-wrap">
    <button id="btnCam" class="ctrl-btn" onclick="toggleCam()">📷</button>
    <div class="ctrl-lbl">鏡頭</div>
  </div>
  <div class="ctrl-wrap">
    <button class="ctrl-btn" style="background:rgba(240,68,68,0.8)" onclick="endCall()">📵</button>
    <div class="ctrl-lbl">結束</div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// On-screen debug log
// ─────────────────────────────────────────────
const _dbg = document.getElementById('debugPanel');
function dbg(...args) {
  const line = args.map(a => (typeof a === 'object' ? JSON.stringify(a) : String(a))).join(' ');
  console.log('[DBG]', line);
  const el = document.createElement('div');
  el.textContent = new Date().toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}) + ' ' + line;
  _dbg.appendChild(el);
  // Keep last 30 lines
  while (_dbg.children.length > 31) _dbg.removeChild(_dbg.children[1]);
}

// ─────────────────────────────────────────────
// Config
// ─────────────────────────────────────────────
const pathParts = window.location.pathname.split('/').filter(Boolean);
const ROOM_ID   = pathParts[pathParts.length - 1];
const wsProto   = location.protocol === 'https:' ? 'wss:' : 'ws:';
const WS_URL    = `${wsProto}//${location.host}/ws/voice/${ROOM_ID}`;

// VAD tuning
const VAD_THRESHOLD   = 14;   // fallback floor (overridden by calibration)
const SPEECH_START_MS = 280;  // must detect voice for this long before recording
const SILENCE_END_MS  = 850;  // silence duration to end recording
const MIN_AUDIO_MS    = 400;  // discard very short clips
const MAX_AUDIO_MS    = 8000; // auto-end after 8s (safety)
const SILENCE_RATIO   = 0.55; // hysteresis: stop-recording threshold = speech threshold × this
let   dynamicThreshold = VAD_THRESHOLD; // updated by calibrateNoise()

// ─────────────────────────────────────────────
// DOM
// ─────────────────────────────────────────────
const chloeVideo  = document.getElementById('chloeVideo');
const statusPill  = document.getElementById('statusPill');
const subtitleEl  = document.getElementById('subtitle');
const listenWave  = document.getElementById('listenWave');
const selfVideo   = document.getElementById('selfVideo');
const btnMic      = document.getElementById('btnMic');
const btnCam      = document.getElementById('btnCam');

// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let ws             = null;
let micStream      = null;
let videoStream    = null;
let audioCtx       = null;
let analyser       = null;
let mediaRecorder  = null;
let audioChunks    = [];
let micEnabled     = true;
let camEnabled     = true;
let chloeIsTalking = false;
let currentSource  = null;   // currently playing AudioBufferSourceNode
let subtitleTimer  = null;

// Barge-in: patient speaks for this long while Chloe is talking → interrupt
const BARGE_IN_MS  = 600;
let bargeInStart   = null;

// VAD state
let vadActive      = false;
let isRecording    = false;
let speechStart    = null;   // when we first detected potential speech (pre-recording)
let lastSpeechAt   = 0;      // timestamp of last frame above dynamicThreshold
let recordStart    = null;   // when MediaRecorder started

// ─────────────────────────────────────────────
// Chloe visual state
// ─────────────────────────────────────────────

function setChloeState(state) {
  chloeVideo.className = state; // '' | 'speaking' | 'thinking'
}

// --- REMOVE: old canvas drawChloe (replaced by photo) ---
function drawChloe() {
  const W = canvas.width, H = canvas.height;
  const cx = W / 2;
  const faceY = H * 0.40;
  const s = Math.min(W, H) / 580;  // scale factor

  ctx.clearRect(0, 0, W, H);

  // — Background: dark clinical room —
  const bg = ctx.createRadialGradient(cx, faceY, 0, cx, H * 0.5, W * 0.85);
  bg.addColorStop(0, '#18291e');
  bg.addColorStop(0.5, '#0f1e14');
  bg.addColorStop(1, '#080d09');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // subtle vignette
  const vig = ctx.createRadialGradient(cx, H * 0.5, H * 0.2, cx, H * 0.5, H * 0.8);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  // idle micro-movement
  idlePhase += 0.012;
  const breathY = Math.sin(idlePhase) * 2.5;

  const fy = faceY + breathY;

  // — White coat body —
  ctx.fillStyle = '#f2f2f0';
  ctx.beginPath();
  ctx.moveTo(cx - 110 * s, fy + 160 * s);
  ctx.bezierCurveTo(cx - 110 * s, fy + 240 * s, cx - 150 * s, H, cx - 180 * s, H);
  ctx.lineTo(cx + 180 * s, H);
  ctx.bezierCurveTo(cx + 150 * s, H, cx + 110 * s, fy + 240 * s, cx + 110 * s, fy + 160 * s);
  ctx.lineTo(cx + 70 * s, fy + 120 * s);
  ctx.lineTo(cx, fy + 100 * s);
  ctx.lineTo(cx - 70 * s, fy + 120 * s);
  ctx.closePath();
  ctx.fill();

  // Coat collar V
  ctx.fillStyle = '#e0e0de';
  ctx.beginPath();
  ctx.moveTo(cx - 70 * s, fy + 120 * s);
  ctx.lineTo(cx, fy + 155 * s);
  ctx.lineTo(cx + 70 * s, fy + 120 * s);
  ctx.lineTo(cx + 50 * s, fy + 95 * s);
  ctx.lineTo(cx, fy + 130 * s);
  ctx.lineTo(cx - 50 * s, fy + 95 * s);
  ctx.closePath();
  ctx.fill();

  // Neck
  ctx.fillStyle = '#d4946a';
  ctx.beginPath();
  ctx.ellipse(cx, fy + 87 * s, 22 * s, 38 * s, 0, 0, Math.PI * 2);
  ctx.fill();

  // — Face oval —
  ctx.fillStyle = '#d4946a';
  ctx.beginPath();
  ctx.ellipse(cx, fy, 72 * s, 90 * s, 0, 0, Math.PI * 2);
  ctx.fill();

  // Face shading — subtle depth
  const faceShade = ctx.createRadialGradient(cx - 15 * s, fy - 10 * s, 5 * s, cx, fy, 80 * s);
  faceShade.addColorStop(0, 'rgba(255,220,180,0.22)');
  faceShade.addColorStop(1, 'rgba(160,80,40,0.18)');
  ctx.fillStyle = faceShade;
  ctx.beginPath();
  ctx.ellipse(cx, fy, 72 * s, 90 * s, 0, 0, Math.PI * 2);
  ctx.fill();

  // — Hair —
  ctx.fillStyle = '#140800';
  // top
  ctx.beginPath();
  ctx.ellipse(cx, fy - 55 * s, 76 * s, 58 * s, 0, Math.PI, Math.PI * 2);
  ctx.fill();
  // left side hair
  ctx.beginPath();
  ctx.ellipse(cx - 72 * s, fy - 8 * s, 18 * s, 52 * s, -0.28, 0, Math.PI * 2);
  ctx.fill();
  // right side hair
  ctx.beginPath();
  ctx.ellipse(cx + 72 * s, fy - 8 * s, 18 * s, 52 * s, 0.28, 0, Math.PI * 2);
  ctx.fill();

  // Hair highlight
  ctx.fillStyle = 'rgba(60,30,10,0.4)';
  ctx.beginPath();
  ctx.ellipse(cx + 10 * s, fy - 70 * s, 30 * s, 18 * s, 0.4, 0, Math.PI * 2);
  ctx.fill();

  // — Eyebrows —
  ctx.strokeStyle = '#4a2a0e';
  ctx.lineWidth = 3.2 * s;
  ctx.lineCap = 'round';
  [[-1, 1], [1, -1]].forEach(([d, _]) => {
    ctx.beginPath();
    ctx.moveTo(cx + d * 38 * s, fy - 30 * s);
    ctx.quadraticCurveTo(cx + d * 24 * s, fy - 39 * s, cx + d * 12 * s, fy - 33 * s);
    ctx.stroke();
  });

  // — Eyes —
  const eyeY = fy - 18 * s;
  const blink = isBlinking;
  [-1, 1].forEach(side => {
    const ex = cx + side * 24 * s;
    if (!blink) {
      // white
      ctx.fillStyle = '#faf5ef';
      ctx.beginPath();
      ctx.ellipse(ex, eyeY, 14 * s, 9 * s, 0, 0, Math.PI * 2);
      ctx.fill();
      // iris
      ctx.fillStyle = '#2e1800';
      ctx.beginPath();
      ctx.ellipse(ex, eyeY, 8 * s, 8 * s, 0, 0, Math.PI * 2);
      ctx.fill();
      // pupil highlight
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath();
      ctx.ellipse(ex + 3 * s, eyeY - 3 * s, 2.5 * s, 2.5 * s, 0, 0, Math.PI * 2);
      ctx.fill();
      // eyelid line
      ctx.strokeStyle = '#8a4a20';
      ctx.lineWidth = 1.5 * s;
      ctx.beginPath();
      ctx.moveTo(ex - 14 * s, eyeY);
      ctx.quadraticCurveTo(ex, eyeY - 11 * s, ex + 14 * s, eyeY);
      ctx.stroke();
    } else {
      // closed eye
      ctx.strokeStyle = '#6a3a18';
      ctx.lineWidth = 2.5 * s;
      ctx.beginPath();
      ctx.moveTo(ex - 13 * s, eyeY);
      ctx.quadraticCurveTo(ex, eyeY - 8 * s, ex + 13 * s, eyeY);
      ctx.stroke();
    }
    // lower lash
    ctx.strokeStyle = '#8a4a20';
    ctx.lineWidth = 1.2 * s;
    ctx.beginPath();
    ctx.moveTo(ex - 12 * s, eyeY + 2 * s);
    ctx.quadraticCurveTo(ex, eyeY + 8 * s, ex + 12 * s, eyeY + 2 * s);
    ctx.stroke();
  });

  // — Nose —
  ctx.strokeStyle = '#b87858';
  ctx.lineWidth = 1.8 * s;
  ctx.beginPath();
  ctx.moveTo(cx + 3 * s, fy - 2 * s);
  ctx.quadraticCurveTo(cx + 8 * s, fy + 12 * s, cx + 4 * s, fy + 18 * s);
  ctx.moveTo(cx - 3 * s, fy - 2 * s);
  ctx.quadraticCurveTo(cx - 8 * s, fy + 12 * s, cx - 4 * s, fy + 18 * s);
  ctx.stroke();
  // nostrils
  ctx.fillStyle = '#b07050';
  ctx.beginPath();
  ctx.ellipse(cx - 10 * s, fy + 19 * s, 5 * s, 3.5 * s, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + 10 * s, fy + 19 * s, 5 * s, 3.5 * s, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // — Mouth —
  const mouthY = fy + 42 * s;
  const mw = 24 * s;
  const mo = mouthOpen * 14 * s;

  if (mo > 2) {
    // open mouth interior
    ctx.fillStyle = '#4a1010';
    ctx.beginPath();
    ctx.ellipse(cx, mouthY + mo * 0.3, mw * 0.88, mo * 0.75, 0, 0, Math.PI * 2);
    ctx.fill();
    // upper teeth
    ctx.fillStyle = '#ede8e4';
    ctx.beginPath();
    ctx.ellipse(cx, mouthY - mo * 0.1, mw * 0.75, mo * 0.4, 0, 0, Math.PI);
    ctx.fill();
  }
  // lip outline
  ctx.strokeStyle = '#c06058';
  ctx.lineWidth = 2.8 * s;
  ctx.lineCap = 'round';
  // upper lip
  ctx.beginPath();
  ctx.moveTo(cx - mw, mouthY);
  ctx.quadraticCurveTo(cx - mw * 0.5, mouthY - 8 * s, cx, mouthY - 3 * s);
  ctx.quadraticCurveTo(cx + mw * 0.5, mouthY - 8 * s, cx + mw, mouthY);
  ctx.stroke();
  // lower lip
  ctx.beginPath();
  ctx.moveTo(cx - mw, mouthY);
  ctx.quadraticCurveTo(cx, mouthY + 9 * s + mo, cx + mw, mouthY);
  ctx.stroke();

  // — Subtle cheek blush —
  [-1, 1].forEach(side => {
    const blush = ctx.createRadialGradient(cx + side * 52 * s, fy + 18 * s, 0, cx + side * 52 * s, fy + 18 * s, 22 * s);
    blush.addColorStop(0, 'rgba(220,100,80,0.18)');
    blush.addColorStop(1, 'rgba(220,100,80,0)');
    ctx.fillStyle = blush;
    ctx.beginPath();
    ctx.ellipse(cx + side * 52 * s, fy + 18 * s, 22 * s, 16 * s, 0, 0, Math.PI * 2);
    ctx.fill();
  });

  // — Name tag overlay —
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.roundRect(cx - 100 * s, H - 52 * s, 200 * s, 38 * s, 8 * s);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.font = `bold ${14 * s}px -apple-system, PingFang HK, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('Chloe 陳', cx, H - 33 * s);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = `${11 * s}px -apple-system, PingFang HK, sans-serif`;
  ctx.fillText('心宜中醫 AI 助理', cx, H - 20 * s);

  // — Speaking ring (when Chloe is talking) —
  if (chloeIsTalking) {
    const ring = ctx.createRadialGradient(cx, fy, 70 * s, cx, fy, 120 * s);
    ring.addColorStop(0, 'rgba(62,207,142,0.12)');
    ring.addColorStop(1, 'rgba(62,207,142,0)');
    ctx.fillStyle = ring;
    ctx.beginPath();
    ctx.arc(cx, fy, 120 * s + Math.sin(idlePhase * 3) * 8 * s, 0, Math.PI * 2);
    ctx.fill();
  }
}


// ─────────────────────────────────────────────
// WebSocket
// ─────────────────────────────────────────────
function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen  = () => { setStatus('s-conn', '連接中…'); dbg('WS open'); };
  ws.onmessage = async ({ data }) => {
    let msg; try { msg = JSON.parse(data); } catch { return; }
    dbg('WS←' + msg.type + (msg.text ? ' "' + msg.text.slice(0,30) + '"' : ''));
    switch (msg.type) {
      case 'ready':
        // Calibrate noise — VAD will start after welcome audio finishes
        // (playAudio → onended → resumeVAD). If no welcome audio, start now.
        dbg('WS ready — calibrating');
        await calibrateNoise();
        if (!chloeIsTalking) {
          startVAD();
          startLiveRecog();
          setStatus('s-idle', '已連線 · 正在聆聽');
        }
        // else: welcome audio is playing; onended will call resumeVAD()
        break;
      case 'status':
        if (msg.text.includes('聽')) { setStatus('s-listening', '聆聽中…'); setChloeState(''); }
        else if (msg.text.includes('諗')) { setStatus('s-thinking', 'Chloe 諗緊…'); setChloeState('thinking'); }
        else if (msg.text.includes('回')) { setStatus('s-speaking', 'Chloe 回緊…'); setChloeState('speaking'); }
        break;
      case 'transcript':
        // Show what the user said (Whisper transcription)
        showUserTranscript(msg.text);
        break;
      case 'response':
        if (msg.audio_b64) {
          // Decode first → get exact duration → sync subtitles to audio
          await playAudioWithSubtitles(msg.text, msg.audio_b64);
        } else {
          showSubtitle(msg.text);
          chloeIsTalking = false;
          setChloeState('');
          resumeVAD();
          setStatus('s-idle', '已連線 · 正在聆聽');
        }
        break;
      case 'error':
        setStatus('s-error', msg.text);
        resumeVAD();
        setTimeout(() => setStatus('s-idle', '已連線 · 正在聆聽'), 3000);
        break;
    }
  };
  ws.onerror  = (e) => { setStatus('s-error', '連線錯誤'); dbg('WS error', e.type); };
  ws.onclose  = () => {
    setStatus('s-conn', '重新連接…');
    stopVAD();
    setTimeout(connect, 3000);
  };
}

// ─────────────────────────────────────────────
// Media setup
// ─────────────────────────────────────────────
async function setupMedia() {
  try {
    const full = await navigator.mediaDevices.getUserMedia({ audio: true, video: { facingMode: 'user' } });
    micStream   = new MediaStream(full.getAudioTracks());
    videoStream = new MediaStream(full.getVideoTracks());
    selfVideo.srcObject = videoStream;
  } catch {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      document.getElementById('selfView').style.display = 'none';
    } catch {
      setStatus('s-error', '請允許麥克風權限');
    }
  }

  if (micStream) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    const src = audioCtx.createMediaStreamSource(micStream);
    src.connect(analyser);
    await calibrateNoise();
  }
}

// Sample ambient noise for 1.2s, set threshold = 2.5× the 75th-percentile
// background level. This handles noisy offices, fans, AC, etc.
async function calibrateNoise() {
  setStatus('s-conn', '環境校準中…');
  await new Promise(r => setTimeout(r, 500)); // let mic warm up

  const fd  = new Uint8Array(analyser.frequencyBinCount);
  const samples = [];
  const iv = setInterval(() => {
    analyser.getByteFrequencyData(fd);
    let sum = 0;
    for (let i = 2; i < 80; i++) sum += fd[i];
    samples.push(sum / 78);
  }, 50);

  await new Promise(r => setTimeout(r, 1200));
  clearInterval(iv);

  const sorted = [...samples].sort((a, b) => a - b);
  const p75 = sorted[Math.floor(sorted.length * 0.75)];
  // Use p75 * 1.3, capped at 80 — enough margin above ambient without being unreachable
  dynamicThreshold = Math.min(Math.max(VAD_THRESHOLD, p75 * 1.3), 80);
  dbg('VAD p75=' + p75.toFixed(1) + ' → threshold=' + dynamicThreshold.toFixed(1));
}

// ─────────────────────────────────────────────
// Vision frame capture — for TCM 望診
// ─────────────────────────────────────────────

/**
 * Capture a JPEG frame from the patient's camera and return the raw base64
 * string (no data-URI prefix).  Returns null if the camera isn't available.
 *
 * drawImage() reads from the underlying MediaStream, so it captures the
 * unmirrored (natural) frame regardless of the CSS scaleX(-1) on #selfVideo.
 * That's what we want — natural face orientation for TCM analysis.
 */
function captureFrame() {
  if (!videoStream) return null;
  const track = videoStream.getVideoTracks()[0];
  if (!track || track.readyState !== 'live' || !track.enabled) return null;
  const canvas = document.getElementById('captureCanvas');
  if (!canvas) return null;
  try {
    const ctx2d = canvas.getContext('2d');
    ctx2d.drawImage(selfVideo, 0, 0, canvas.width, canvas.height);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.65);
    // Strip "data:image/jpeg;base64,"
    const b64 = dataUrl.split(',')[1];
    return b64 || null;
  } catch (err) {
    dbg('captureFrame err: ' + err);
    return null;
  }
}

// ─────────────────────────────────────────────
// VAD — Voice Activity Detection
// ─────────────────────────────────────────────
let vadInterval = null;
let freqData    = null; // sized after analyser is created

function getAmplitude() {
  if (!analyser) return 0;
  if (!freqData) freqData = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(freqData);
  let sum = 0;
  // bins 2-79 ≈ 86 Hz – 3.4 kHz: covers speech, skips DC/rumble
  for (let i = 2; i < 80; i++) sum += freqData[i];
  return sum / 78;
}

let _ampDebugInterval = null;

function startVAD() {
  if (vadActive) return; // already running — don't double-start
  vadActive = true;
  vadInterval = setInterval(vadTick, 50);
  // Live amp debug — only one instance
  if (!_ampDebugInterval) {
    _ampDebugInterval = setInterval(() => {
      if (!vadActive) return;
      const a = getAmplitude();
      const mark = a > dynamicThreshold ? '🔴SPEECH' : '🟢quiet';
      dbg('amp=' + a.toFixed(1) + ' thr=' + dynamicThreshold.toFixed(1) + ' ' + mark);
    }, 2000);
  }
}

function stopVAD() {
  vadActive = false;
  clearInterval(vadInterval);
  if (isRecording) abortRecording();
}

function resumeVAD() {
  if (!vadActive) startVAD();
  listenWave.classList.remove('show');
}

function interruptChloe() {
  if (!chloeIsTalking) return;
  dbg('BARGE-IN: stopping Chloe');
  try { currentSource?.stop(); } catch {}
  currentSource  = null;
  chloeIsTalking = false;
  bargeInStart   = null;
  setChloeState('');
  // Clear queued subtitles
  clearTimeout(chunkTimer);
  chunkQueue = [];
  subtitleEl.classList.remove('show');
  setStatus('s-idle', '已連線 · 正在聆聽');
  startLiveRecog();
  // Don't resumeVAD() — vadTick is still running, will handle speech naturally
}

function vadTick() {
  if (!vadActive || !micEnabled) return;

  const amp = getAmplitude();
  const now = Date.now();

  // ── Barge-in detection (runs even while Chloe is talking) ──
  if (chloeIsTalking) {
    if (amp > dynamicThreshold) {
      if (bargeInStart === null) bargeInStart = now;
      else if (now - bargeInStart > BARGE_IN_MS) interruptChloe();
    } else {
      bargeInStart = null;
    }
    return; // don't start a new recording while Chloe is still speaking
  }

  bargeInStart = null; // reset when Chloe isn't talking

  if (amp > dynamicThreshold) {
    // ── Speech frame ──
    lastSpeechAt = now;

    if (!isRecording) {
      if (speechStart === null) speechStart = now;
      else if (now - speechStart > SPEECH_START_MS) startRecording();
    } else {
      // Hard cap — safety net
      if (now - recordStart > MAX_AUDIO_MS) stopRecording();
    }
  } else {
    // ── Sub-threshold ──
    speechStart = null;

    if (isRecording && lastSpeechAt > 0 && now - lastSpeechAt > SILENCE_END_MS) {
      stopRecording();
    }
  }
}

// Pick the best MIME type this browser supports (Safari → mp4, Chrome → webm)
function getSupportedMimeType() {
  const candidates = [
    'audio/webm;codecs=opus',
    'audio/webm',
    'audio/mp4;codecs=mp4a.40.2',
    'audio/mp4',
    'audio/ogg;codecs=opus',
    'audio/ogg',
  ];
  for (const t of candidates) {
    if (MediaRecorder.isTypeSupported(t)) return t;
  }
  return ''; // let browser decide
}

let recordingMime = ''; // set in startRecording, read in onRecordingStop

function startRecording() {
  if (isRecording || !micStream) return;
  isRecording = true;
  recordStart = Date.now();
  audioChunks = [];
  listenWave.classList.add('show');
  setStatus('s-listening', '聆聽中…');

  try {
    recordingMime = getSupportedMimeType();
    const opts = recordingMime ? { mimeType: recordingMime } : {};
    dbg('REC start mime=' + (recordingMime || 'default'));
    mediaRecorder = new MediaRecorder(micStream, opts);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = onRecordingStop;
    mediaRecorder.start(100);
  } catch (err) {
    dbg('REC ERROR: ' + err);
    isRecording = false;
    lastSpeechAt = 0;
    listenWave.classList.remove('show');
    setStatus('s-idle', '已連線 · 正在聆聽');
  }
}

function stopRecording() {
  if (!isRecording) return;
  isRecording  = false;
  speechStart  = null;
  lastSpeechAt = 0;
  listenWave.classList.remove('show');
  mediaRecorder?.stop();
}

function abortRecording() {
  isRecording  = false;
  speechStart  = null;
  lastSpeechAt = 0;
  listenWave.classList.remove('show');
  try { mediaRecorder?.stop(); } catch {}
  audioChunks = [];
}

async function onRecordingStop() {
  const duration = Date.now() - recordStart;
  dbg('REC stopped dur=' + duration + 'ms chunks=' + audioChunks.length);
  if (audioChunks.length === 0 || duration < MIN_AUDIO_MS) {
    dbg('REC discard (too short)');
    setStatus('s-idle', '已連線 · 正在聆聽');
    return;
  }
  // Pause VAD while waiting for response
  stopVAD();
  setStatus('s-thinking', '傳送中…');

  // ── 1. Capture vision frame and send before audio ──────────────
  // Always send a vision_frame message so the server knows the camera state.
  // If the camera is off / unavailable, send camera_off:true so Chloe can
  // proactively ask the patient to turn it on (TCM 望診 requires seeing the face).
  if (ws?.readyState === WebSocket.OPEN) {
    const frameB64 = captureFrame();
    if (frameB64) {
      ws.send(JSON.stringify({ type: 'vision_frame', image_b64: frameB64 }));
      dbg('vision_frame sent b64_len=' + frameB64.length);
    } else {
      ws.send(JSON.stringify({ type: 'vision_frame', camera_off: true }));
      dbg('vision_frame: camera off — notifying server');
    }
  }

  // ── 2. Send audio ──────────────────────────────────────────────
  const blobType = recordingMime || 'audio/webm';
  const blob   = new Blob(audioChunks, { type: blobType });
  const buffer = await blob.arrayBuffer();
  dbg('REC send ' + buffer.byteLength + 'b mime=' + blobType);
  if (ws?.readyState === WebSocket.OPEN) ws.send(buffer);
  audioChunks = [];
}

// ─────────────────────────────────────────────
// Audio playback — AudioContext for reliability
// ─────────────────────────────────────────────
async function playAudioWithSubtitles(text, b64) {
  chloeIsTalking = true;
  setChloeState('speaking');
  setStatus('s-speaking', 'Chloe 正在說話…');
  try {
    if (!audioCtx || audioCtx.state === 'closed') {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    const bytes   = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const decoded = await audioCtx.decodeAudioData(bytes.buffer);

    // Sync subtitles to actual audio duration
    showSubtitle(text, decoded.duration * 1000);

    const source = audioCtx.createBufferSource();
    currentSource = source;
    source.buffer = decoded;
    source.connect(audioCtx.destination);
    source.start(0);
    stopLiveRecog();

    source.onended = () => {
      if (currentSource === source) currentSource = null;
      chloeIsTalking = false;
      bargeInStart   = null;
      setChloeState('');
      setTimeout(() => {
        setStatus('s-idle', '已連線 · 正在聆聽');
        resumeVAD();
        startLiveRecog();
      }, 400);
    };
  } catch (e) {
    dbg('Audio play error: ' + e);
    currentSource  = null;
    chloeIsTalking = false;
    bargeInStart   = null;
    setChloeState('');
    setStatus('s-idle', '已連線 · 正在聆聽');
    resumeVAD();
    startLiveRecog();
  }
}

// ─────────────────────────────────────────────
// Subtitle — movie-style chunked display
// ─────────────────────────────────────────────
const MAX_SUB_CHARS = 18; // max Chinese chars per subtitle line

function splitSubtitle(text) {
  const chunks = [];
  // Split on newlines first (Chloe sends multi-bubble responses)
  const lines = text.split(/\n+/).map(l => l.trim()).filter(Boolean);

  for (const line of lines) {
    // Split on sentence-ending punctuation, keeping it attached
    const sentences = line.split(/(?<=[。！？…⋯])\s*/).filter(Boolean);

    for (const sentence of sentences) {
      if (sentence.length <= MAX_SUB_CHARS) {
        chunks.push(sentence.trim());
      } else {
        // Split long sentences on mid-sentence punctuation
        const parts = sentence.split(/(?<=[，；、：])\s*/).filter(Boolean);
        let current = '';
        for (const part of parts) {
          if (!current) {
            current = part;
          } else if ((current + part).length <= MAX_SUB_CHARS) {
            current += part;
          } else {
            if (current.trim()) chunks.push(current.trim());
            current = part;
          }
        }
        if (current.trim()) chunks.push(current.trim());
      }
    }
  }
  return chunks.filter(c => c.trim().length > 0);
}

let chunkTimer = null;
let chunkQueue = [];
let chunkHolds = []; // per-chunk hold durations in ms

function showSubtitle(text, totalAudioMs = null) {
  clearTimeout(chunkTimer);
  chunkQueue = splitSubtitle(text);
  if (!chunkQueue.length) return;

  if (totalAudioMs && totalAudioMs > 0) {
    // Distribute audio duration proportionally across chunks by char count
    const totalChars = chunkQueue.reduce((s, c) => s + c.length, 0) || 1;
    // Reserve 600ms at the end so last chunk doesn't vanish mid-word
    const budget = Math.max(0, totalAudioMs - 600);
    chunkHolds = chunkQueue.map(c => Math.max(700, (c.length / totalChars) * budget));
  } else {
    // Fallback: fixed 160ms per char
    chunkHolds = chunkQueue.map(c => Math.min(3000, Math.max(1200, c.length * 160)));
  }

  _showNextChunk(0);
}

function _showNextChunk(i) {
  if (i >= chunkQueue.length) {
    chunkTimer = setTimeout(() => subtitleEl.classList.remove('show'), 1200);
    return;
  }
  subtitleEl.textContent = chunkQueue[i];
  subtitleEl.classList.remove('user-speech');
  subtitleEl.classList.add('show');
  chunkTimer = setTimeout(() => _showNextChunk(i + 1), chunkHolds[i]);
}

function showUserTranscript(text) {
  clearTimeout(chunkTimer);
  chunkQueue = [];
  subtitleEl.textContent = '你：' + text;
  subtitleEl.classList.add('show', 'user-speech');
  subtitleTimer = setTimeout(() => subtitleEl.classList.remove('show'), 5000);
}

// ─────────────────────────────────────────────
// Live Speech Recognition (Web Speech API)
// Shows words as user speaks — zh-HK Cantonese
// ─────────────────────────────────────────────
let liveRecog = null;

function startLiveRecog() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return; // not supported — graceful degradation

  liveRecog = new SR();
  liveRecog.lang = 'zh-HK';
  liveRecog.continuous = true;
  liveRecog.interimResults = true;
  liveRecog.maxAlternatives = 1;

  liveRecog.onresult = (e) => {
    if (!isRecording) return; // only show while mic is recording
    let text = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      text += e.results[i][0].transcript;
    }
    if (text.trim()) {
      subtitleEl.textContent = '你：' + text.trim();
      subtitleEl.classList.add('show', 'user-speech');
      clearTimeout(subtitleTimer);
    }
  };

  liveRecog.onend = () => {
    // Auto-restart if VAD is still active
    if (vadActive && !chloeIsTalking) {
      try { liveRecog.start(); } catch {}
    }
  };

  liveRecog.onerror = (e) => {
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') return;
    // Restart on other errors
    if (vadActive) setTimeout(() => { try { liveRecog.start(); } catch {} }, 500);
  };

  try { liveRecog.start(); } catch {}
}

function stopLiveRecog() {
  try { liveRecog?.stop(); } catch {}
}

// ─────────────────────────────────────────────
// UI helpers
// ─────────────────────────────────────────────
function setStatus(cls, text) {
  statusPill.className = cls;
  statusPill.textContent = text;
}

function toggleMic() {
  micEnabled = !micEnabled;
  micStream?.getAudioTracks().forEach(t => { t.enabled = micEnabled; });
  btnMic.textContent = micEnabled ? '🎙️' : '🔇';
  btnMic.classList.toggle('off', !micEnabled);
  if (!micEnabled && isRecording) abortRecording();
}

function toggleCam() {
  camEnabled = !camEnabled;
  videoStream?.getVideoTracks().forEach(t => { t.enabled = camEnabled; });
  btnCam.textContent = camEnabled ? '📷' : '🚫';
  btnCam.classList.toggle('off', !camEnabled);
  document.getElementById('selfView').style.opacity = camEnabled ? '1' : '0.3';
}

function endCall() {
  stopVAD();
  stopLiveRecog();
  // Kill any playing audio immediately
  try { currentSource?.stop(); } catch {}
  currentSource = null;
  chloeIsTalking = false;
  clearTimeout(chunkTimer);
  if (ws) { ws.onclose = null; ws.close(); }
  micStream?.getTracks().forEach(t => t.stop());
  videoStream?.getTracks().forEach(t => t.stop());
  try { audioCtx?.close(); } catch {}
  document.body.innerHTML = `
    <div style="height:100vh;display:flex;flex-direction:column;align-items:center;
                justify-content:center;gap:16px;background:#0b0f0c;color:#e8edf2;
                font-family:-apple-system,PingFang HK,sans-serif;text-align:center;padding:32px">
      <div style="font-size:48px">✅</div>
      <div style="font-size:20px;font-weight:600">診症完畢</div>
      <div style="font-size:14px;color:rgba(255,255,255,0.5);line-height:1.6">
        感謝使用心宜中醫視頻診症<br>如需跟進，請透過 WhatsApp 聯絡
      </div>
      <button onclick="window.close()" style="margin-top:8px;padding:12px 32px;
        background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);
        border-radius:999px;color:#e8edf2;font-size:15px;cursor:pointer">關閉視窗</button>
    </div>`;
}

// ─────────────────────────────────────────────
// Init — gated behind the welcome splash
// ─────────────────────────────────────────────
async function startCall() {
  document.getElementById('welcomeSplash').style.display = 'none';
  await setupMedia();
  connect();
}
// Do NOT auto-start — wait for user to tap "接通診症"
</script>
