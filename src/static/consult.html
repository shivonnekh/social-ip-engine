<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>心宜中醫 · 視頻診症</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0b0f14;
    --surface:   #141920;
    --green:     #3ecf8e;
    --red:       #f04444;
    --amber:     #f0a844;
    --text:      #e8edf2;
    --muted:     #6b7888;
    --radius:    14px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "PingFang HK", "Noto Sans HK", sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }

  /* ── Layout ── */
  #app {
    position: relative;
    width: 100vw;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* Remote video — fills the whole screen */
  #remoteVideo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: var(--bg);
    display: block;
  }

  /* Self view — bottom-right pip */
  #localVideo {
    position: absolute;
    bottom: 90px;
    right: 16px;
    width: 110px;
    height: 150px;
    object-fit: cover;
    border-radius: var(--radius);
    border: 2px solid rgba(255,255,255,0.15);
    background: #1a2130;
    z-index: 10;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #localVideo:hover { opacity: 0.85; }

  /* ── Header bar ── */
  #header {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 20;
    padding: 16px 20px 12px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #header .logo {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--text);
    opacity: 0.9;
  }
  #header .role-badge {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 999px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .role-badge.patient      { background: rgba(62,207,142,0.2); color: var(--green); }
  .role-badge.practitioner { background: rgba(240,168,68,0.2); color: var(--amber); }

  #duration {
    margin-left: auto;
    font-size: 13px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  /* ── Status overlay ── */
  #statusOverlay {
    position: absolute;
    inset: 0;
    z-index: 15;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: var(--bg);
    transition: opacity 0.4s;
  }
  #statusOverlay.hidden { opacity: 0; pointer-events: none; }

  .status-icon {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }
  .status-icon.waiting  { background: rgba(62,207,142,0.12); animation: pulse 2s infinite; }
  .status-icon.calling  { background: rgba(240,168,68,0.12); }
  .status-icon.error    { background: rgba(240,68,68,0.12); }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%       { transform: scale(1.08); opacity: 0.7; }
  }

  #statusText {
    font-size: 17px;
    font-weight: 500;
    text-align: center;
    padding: 0 32px;
    line-height: 1.5;
    color: var(--text);
  }
  #statusSub {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    padding: 0 40px;
    line-height: 1.6;
  }

  /* ── Controls bar ── */
  #controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 20;
    padding: 16px 0 28px;
    display: flex;
    justify-content: center;
    gap: 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
  }

  .ctrl-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    transition: transform 0.15s, opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active { transform: scale(0.92); }
  .ctrl-btn.active   { background: rgba(255,255,255,0.15); }
  .ctrl-btn.inactive { background: rgba(255,255,255,0.07); opacity: 0.55; }
  .ctrl-btn.danger   { background: var(--red); }
  .ctrl-btn.danger:active { background: #c03333; }

  .ctrl-label {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    text-align: center;
    letter-spacing: 0.2px;
  }

  .ctrl-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  /* ── Ended screen ── */
  #endedScreen {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 30;
    background: var(--bg);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-align: center;
    padding: 32px;
  }
  #endedScreen.show { display: flex; }
  #endedScreen h2 { font-size: 22px; font-weight: 600; }
  #endedScreen p  { font-size: 14px; color: var(--muted); line-height: 1.6; }
  .end-icon { font-size: 48px; }
  .close-btn {
    margin-top: 8px;
    padding: 12px 32px;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 999px;
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .close-btn:hover { background: #1e2736; }
</style>
</head>
<body>
<div id="app">

  <!-- Remote video (full screen) -->
  <video id="remoteVideo" autoplay playsinline></video>

  <!-- Self view (pip) -->
  <video id="localVideo" autoplay playsinline muted></video>

  <!-- Header -->
  <div id="header">
    <span class="logo">心宜中醫</span>
    <span id="roleBadge" class="role-badge"></span>
    <span id="duration"></span>
  </div>

  <!-- Status overlay (shown when no remote stream) -->
  <div id="statusOverlay">
    <div id="statusIcon" class="status-icon waiting">📡</div>
    <div id="statusText">連接中…</div>
    <div id="statusSub"></div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <div class="ctrl-wrap">
      <button id="btnMic" class="ctrl-btn active" onclick="toggleMic()" title="靜音">🎙️</button>
      <div class="ctrl-label">靜音</div>
    </div>
    <div class="ctrl-wrap">
      <button id="btnCam" class="ctrl-btn active" onclick="toggleCam()" title="關鏡頭">📷</button>
      <div class="ctrl-label">鏡頭</div>
    </div>
    <div class="ctrl-wrap">
      <button class="ctrl-btn danger" onclick="hangUp()" title="結束">📵</button>
      <div class="ctrl-label">結束</div>
    </div>
  </div>

  <!-- Ended screen -->
  <div id="endedScreen">
    <div class="end-icon">✅</div>
    <h2>診症完畢</h2>
    <p>感謝您使用心宜中醫視頻診症服務。<br>如有需要，請透過 WhatsApp 跟進。</p>
    <button class="close-btn" onclick="window.close()">關閉視窗</button>
  </div>

</div>

<script>
// ─────────────────────────────────────────
// Config from URL
// ─────────────────────────────────────────
const pathParts = window.location.pathname.split('/');
const ROOM_ID   = pathParts[pathParts.length - 1];
const params    = new URLSearchParams(window.location.search);
const ROLE      = params.get('role') || 'patient'; // patient | practitioner

const wsProto   = location.protocol === 'https:' ? 'wss:' : 'ws:';
const WS_URL    = `${wsProto}//${location.host}/ws/consultation/${ROOM_ID}/${ROLE}`;
const ICE_URL   = '/api/consultation/ice-config';

// ─────────────────────────────────────────
// DOM refs
// ─────────────────────────────────────────
const remoteVideo   = document.getElementById('remoteVideo');
const localVideo    = document.getElementById('localVideo');
const statusOverlay = document.getElementById('statusOverlay');
const statusIcon    = document.getElementById('statusIcon');
const statusText    = document.getElementById('statusText');
const statusSub     = document.getElementById('statusSub');
const roleBadge     = document.getElementById('roleBadge');
const durationEl    = document.getElementById('duration');
const endedScreen   = document.getElementById('endedScreen');
const btnMic        = document.getElementById('btnMic');
const btnCam        = document.getElementById('btnCam');

// ─────────────────────────────────────────
// State
// ─────────────────────────────────────────
let pc        = null;  // RTCPeerConnection
let ws        = null;  // WebSocket
let localStream     = null;
let micEnabled      = true;
let camEnabled      = true;
let callStarted     = false;
let durationTimer   = null;
let callSeconds     = 0;

// ─────────────────────────────────────────
// Init
// ─────────────────────────────────────────
roleBadge.textContent = ROLE === 'practitioner' ? '醫師' : '患者';
roleBadge.classList.add(ROLE);

setStatus('⏳', 'waiting', '啟動鏡頭中…', '請允許瀏覽器使用鏡頭和麥克風');

(async function init() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    localVideo.srcObject = localStream;
  } catch (e) {
    setStatus('❌', 'error', '無法開啟鏡頭', '請喺瀏覽器設定允許鏡頭 / 麥克風存取。');
    return;
  }

  const iceResp = await fetch(ICE_URL);
  const iceConfig = await iceResp.json();

  pc = new RTCPeerConnection(iceConfig);

  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.onicecandidate = ({ candidate }) => {
    if (candidate && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'ice-candidate', candidate }));
    }
  };

  pc.ontrack = (event) => {
    if (remoteVideo.srcObject !== event.streams[0]) {
      remoteVideo.srcObject = event.streams[0];
      onCallConnected();
    }
  };

  pc.onconnectionstatechange = () => {
    if (['failed', 'disconnected', 'closed'].includes(pc.connectionState)) {
      if (callStarted) showEnded();
      else setStatus('❌', 'error', '連接中斷', '對方已離線或網絡問題，請重新整理頁面。');
    }
  };

  connectWs();
})();

// ─────────────────────────────────────────
// WebSocket signaling
// ─────────────────────────────────────────
function connectWs() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setStatus('📡', 'waiting', '等待對方加入…', '');
  };

  ws.onmessage = async ({ data }) => {
    let msg;
    try { msg = JSON.parse(data); } catch { return; }

    switch (msg.type) {
      case 'waiting':
        setStatus('📡', 'waiting', '等待對方加入…',
          ROLE === 'patient'
            ? '請將連結分享俾醫師，或等待醫師加入'
            : '等待患者加入');
        break;

      case 'please-offer':
        // I was here first — now peer joined, I create the offer
        setStatus('🔗', 'calling', '對方已加入，連接中…', '');
        await createOffer();
        break;

      case 'offer':
        // I'm the answerer
        setStatus('🔗', 'calling', '連接中…', '');
        await pc.setRemoteDescription(new RTCSessionDescription(msg));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        wsSend({ type: 'answer', sdp: answer.sdp });
        break;

      case 'answer':
        await pc.setRemoteDescription(new RTCSessionDescription(msg));
        break;

      case 'ice-candidate':
        if (msg.candidate) {
          try { await pc.addIceCandidate(new RTCIceCandidate(msg.candidate)); }
          catch (e) { console.warn('ICE add failed', e); }
        }
        break;

      case 'peer-left':
        if (callStarted) showEnded();
        else setStatus('📡', 'waiting', '對方已離開', '請等待或重新整理。');
        break;
    }
  };

  ws.onerror = () => {
    setStatus('❌', 'error', '連線錯誤', '請重新整理頁面再試。');
  };

  ws.onclose = () => {
    if (callStarted) return;
    // Attempt reconnect after 3s if call not yet started
    setTimeout(connectWs, 3000);
  };
}

function wsSend(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}

async function createOffer() {
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  wsSend({ type: 'offer', sdp: offer.sdp });
}

// ─────────────────────────────────────────
// Call state
// ─────────────────────────────────────────
function onCallConnected() {
  callStarted = true;
  statusOverlay.classList.add('hidden');
  callSeconds = 0;
  durationTimer = setInterval(() => {
    callSeconds++;
    const m = String(Math.floor(callSeconds / 60)).padStart(2, '0');
    const s = String(callSeconds % 60).padStart(2, '0');
    durationEl.textContent = `${m}:${s}`;
  }, 1000);
}

function showEnded() {
  clearInterval(durationTimer);
  if (pc) { pc.close(); pc = null; }
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  localStream?.getTracks().forEach(t => t.stop());
  endedScreen.classList.add('show');
}

// ─────────────────────────────────────────
// Controls
// ─────────────────────────────────────────
function toggleMic() {
  micEnabled = !micEnabled;
  localStream?.getAudioTracks().forEach(t => { t.enabled = micEnabled; });
  btnMic.textContent  = micEnabled ? '🎙️' : '🔇';
  btnMic.className    = `ctrl-btn ${micEnabled ? 'active' : 'inactive'}`;
}

function toggleCam() {
  camEnabled = !camEnabled;
  localStream?.getVideoTracks().forEach(t => { t.enabled = camEnabled; });
  btnCam.textContent = camEnabled ? '📷' : '🚫';
  btnCam.className   = `ctrl-btn ${camEnabled ? 'active' : 'inactive'}`;
}

function hangUp() {
  showEnded();
}

// ─────────────────────────────────────────
// UI helpers
// ─────────────────────────────────────────
function setStatus(icon, iconClass, text, sub) {
  statusIcon.textContent  = icon;
  statusIcon.className    = `status-icon ${iconClass}`;
  statusText.textContent  = text;
  statusSub.textContent   = sub;
  statusOverlay.classList.remove('hidden');
}
</script>
</body>
</html>
