# ── 9 TCM constitution types ──────────────────────────────────────────
# Matcher in src/sales/constitution_matcher.py combines:
#   - tongue_findings (detected by vision)
#   - q1 answer (A/B/C for fatigue)
#   - q2 answer (A/B/C for thermal)
# Dominant type = highest cumulative score across the three signals.

constitution_mapping:
  # NOTE 2026-04-29: extended from 2 questions (Q1+Q2) to 5 (+Q3 sleep,
  # Q4 digestion, Q5 emotional/stress) per user feedback #3 — '兩條問題
  # 嘅準確性亦都唔夠'. Each constitution now has 5 weight maps that
  # contribute to the final score. Tongue signals also expanded to
  # 30+ extended tags (see TONGUE_PROMPT in src/tools/sales.py).
  #
  # Q3 letters: A = poor sleep / dreams / wakings, B = average, C = deep restful sleep
  # Q4 letters: A = bloating / loose stool / weak appetite, B = average, C = constipation / dry / heaty
  # Q5 letters: A = anxious / tense / depressed, B = average, C = calm / steady
  平和質:
    en: Balanced
    characteristics: 精神飽滿、體態適中、面色紅潤、睡眠好
    # Keep this narrow — '平和' should require strict match of the ideal
    # signal set (淡紅 + 薄白苔 only). Any other deviation pushes scoring
    # toward another constitution.
    tongue_signals: [淡紅, 薄白苔]
    q1_weight: {C: 2}
    q2_weight: {B: 2}
    q3_weight: {C: 2}            # deep restful sleep
    q4_weight: {B: 2}            # normal digestion
    q5_weight: {C: 2}            # calm steady mood
    recommendations:
      diet: [五穀雜糧, 季節性蔬果, 適量魚肉, 豆類]
      lifestyle: [早瞓早起, 心境平和, 維持規律作息]
      exercise: [太極, 八段錦, 慢跑, 散步]
      avoid: [暴飲暴食, 長期久坐, 熬夜]
      seek_help_if: [持續身體不適超過 2 週, 出現新症狀]
  氣虛質:
    en: Qi Deficiency
    characteristics: 容易攰、氣短、講嘢聲細
    tongue_signals: [淡, 淡白, 齒痕, 邊有齒痕, 瘦薄, 瘦]
    q1_weight: {A: 3, B: 1}      # tired
    q2_weight: {B: 1}
    q3_weight: {A: 2, B: 1}      # poor / light sleep, easy waking
    q4_weight: {A: 2, B: 1}      # bloating / loose stool / weak appetite
    q5_weight: {B: 1}
    recommendations:
      diet: [黨參, 黃芪, 山藥, 紅棗, 雞肉, 牛肉, 糯米]
      lifestyle: [10pm 前瞓覺, 中午小休, 避免過度操勞]
      exercise: [慢走, 八段錦, 太極]
      avoid: [生冷食物, 凍飲, 熬夜, 過度劇烈運動]
      seek_help_if: [疲倦持續 >2 週唔好轉, 容易暈眩, 心悸氣促]
  陽虛質:
    en: Yang Deficiency
    characteristics: 手腳凍、怕冷、精神差
    tongue_signals: [淡, 淡白, 胖, 胖大, 濕, 水滑, 滑苔]
    q1_weight: {A: 2, B: 1}
    q2_weight: {A: 3}            # cold-sensitive
    q3_weight: {C: 1, A: 1}      # often heavy sleep, sometimes wakes from cold
    q4_weight: {A: 2}            # weak digestion / loose
    q5_weight: {B: 1}
    recommendations:
      diet: [羊肉, 韭菜, 桂圓, 生薑, 桂枝紅茶, 核桃]
      lifestyle: [保暖手腳腰部, 多曬太陽, 早瞓]
      exercise: [八段錦, 戶外散步, 太極]
      avoid: [生冷飲品, 凍水果, 雪糕, 西瓜, 蟹]
      seek_help_if: [手腳冰冷影響睡眠, 怕冷加劇, 經常腹瀉]
  陰虛質:
    en: Yin Deficiency
    characteristics: 口乾、手足心熱、失眠
    tongue_signals: [紅, 深紅, 絳, 少苔, 剝苔, 鏡面, 無苔, 裂紋, 中央裂, 縱裂, 燥, 燥苔, 紅邊, 邊紅尖紅]
    q1_weight: {B: 1, C: 1}
    q2_weight: {C: 3}            # heaty / dry mouth
    q3_weight: {A: 3}            # classic 陰虛 — insomnia, dreams, wakings
    q4_weight: {C: 2}            # constipation / dry stool
    q5_weight: {A: 1, B: 1}
    recommendations:
      diet: [雪耳, 百合, 銀耳, 麥冬, 沙參, 鴨肉, 雪梨, 蜂蜜]
      lifestyle: [早瞓避免熬夜, 室內加濕, 心境平靜]
      exercise: [太極, 瑜伽, 散步]
      avoid: [辛辣, 燒烤, 油炸, 咖啡, 酒, 紅肉過多]
      seek_help_if: [長期失眠超過 1 個月, 口乾舌燥嚴重, 心悸盜汗]
  痰濕質:
    en: Phlegm-Damp
    characteristics: 身重、油脂多、痰多
    tongue_signals: [胖, 胖大, 膩, 膩苔, 厚膩, 厚白, 厚白苔, 齒痕, 邊有齒痕, 痰]
    q1_weight: {A: 1, B: 1}
    q2_weight: {B: 2}
    q3_weight: {A: 1}            # heavy / sluggish sleep
    q4_weight: {A: 2}            # bloating / sluggish digestion
    q5_weight: {B: 1}
    recommendations:
      diet: [薏米, 紅豆, 冬瓜, 茯苓, 山藥, 陳皮, 白蘿蔔]
      lifestyle: [控制體重, 少食多餐, 早瞓, 居住通風]
      exercise: [慢跑, 游泳, 跳繩, 出汗運動]
      avoid: [油膩, 甜食, 凍飲, 過量水果, 奶製品]
      seek_help_if: [體重持續上升, 痰多氣喘, 胸悶心悸]
  濕熱質:
    en: Damp-Heat
    characteristics: 面油、暗瘡、口臭
    tongue_signals: [紅, 深紅, 黃苔, 薄黃苔, 黃膩苔, 厚膩, 膩苔]
    q1_weight: {B: 1}
    q2_weight: {C: 2}            # heaty
    q3_weight: {A: 1, B: 1}      # restless or normal
    q4_weight: {C: 2}            # constipation / heaty digestion
    q5_weight: {A: 2}            # irritable / tense
    recommendations:
      diet: [苦瓜, 綠豆, 薏米, 西瓜, 雪梨, 五花茶, 冬瓜]
      lifestyle: [早瞓, 心境平和, 居住通風乾爽]
      exercise: [游泳, 慢跑, 瑜伽]
      avoid: [辛辣, 燒烤, 油炸, 酒, 牛羊肉, 榴蓮]
      seek_help_if: [暗瘡反覆唔退, 口臭嚴重, 大便不暢]
  血瘀質:
    en: Blood Stasis
    characteristics: 面色暗、易瘀斑、經痛
    tongue_signals: [紫, 瘀紫, 瘀斑, 瘀點, 瘀]
    q1_weight: {B: 1}
    q2_weight: {A: 1, C: 1}
    q3_weight: {A: 1}            # often disturbed sleep
    q4_weight: {B: 1}
    q5_weight: {A: 1, B: 1}
    recommendations:
      diet: [山楂, 黑豆, 玫瑰花茶, 三七, 紅花茶, 黑木耳]
      lifestyle: [多走動, 避免久坐, 保持心情舒暢]
      exercise: [慢跑, 太極, 八段錦, 拉筋]
      avoid: [寒涼食物, 久坐不動, 過度疲勞]
      seek_help_if: [經痛持續加劇, 易瘀斑面積擴大, 胸悶刺痛]
  氣鬱質:
    en: Qi Stagnation
    characteristics: 情緒低、易憂慮、胸悶
    # 氣鬱 tongue is often grossly normal (淡紅/薄白苔) but with subtle
    # edge signals — red edges or 尖紅 from chronic emotional tension.
    tongue_signals: [淡紅, 薄白苔, 紅邊, 邊紅尖紅, 尖]
    q1_weight: {A: 2}
    q2_weight: {B: 1}
    q3_weight: {A: 2}            # difficulty falling asleep, busy mind
    q4_weight: {A: 1, B: 1}      # sometimes nervous-stomach bloating
    q5_weight: {A: 3}            # dominant — anxious / depressive
    recommendations:
      diet: [玫瑰花茶, 茉莉花茶, 陳皮, 佛手, 柑橘, 合歡花]
      lifestyle: [多戶外活動, 與人傾訴, 培養興趣]
      exercise: [慢跑, 太極, 戶外瑜伽, 行山]
      avoid: [長期獨處, 思慮過度, 暴飲暴食]
      seek_help_if: [情緒低落超過 2 週, 失眠胸悶持續, 食欲明顯下降]
  特稟質:
    en: Special (Allergic)
    characteristics: 易過敏、哮喘、鼻敏感
    # 特稟 is purely Q-driven — no reliable tongue signal.
    tongue_signals: []
    q1_weight: {}
    q2_weight: {}
    q3_weight: {}
    q4_weight: {}
    q5_weight: {}
    recommendations:
      diet: [黨參, 黃芪, 山藥, 紅棗 (避免已知致敏原)]
      lifestyle: [環境清潔, 規律作息, 避開致敏原]
      exercise: [慢走, 八段錦, 戶外緩和運動]
      avoid: [已知致敏原, 海鮮 (如有過敏), 辛辣, 灰塵環境]
      seek_help_if: [過敏發作頻密, 呼吸困難, 蕁麻疹反覆]

