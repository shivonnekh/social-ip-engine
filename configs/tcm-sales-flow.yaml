# TCM Sales Flow Configuration — CarePlus 心宜中醫
#
# All patient-facing scripts MUST be HK Cantonese 口語 (per CLAUDE.md §1).
# Never hardcode Chinese text in Python — it belongs here (CLAUDE.md §3.3).
#
# Real clinic data scraped from https://careplustcm.com/location
# Doctor: 洪煊宜 Jessica — 註冊中醫師｜皮膚科｜痛症｜婦科｜針灸
#
# Flow: Greeting → Doctor intro + photo → Tongue request → Tongue analysis
#       → Q1 (fatigue) → Q2 (thermal) → Constitution result
#       → Product pitch → Close A (district) → Close B (clinic info)
#       → Close C (booking date) → Close D (confirmed)

sales_flow:
  default_entry: true            # Auto-enter TCM sales flow on every first message
  # Widened 2026-04-23 — refusal/quit words must exit gracefully, not be
  # blindly stuffed into the current step's field (observed bug: user said
  # "不要" at close_a_district and the bot replied "咁啱啊，不要好近我哋診所").
  # Follow-up (Step 2): replace the whole state machine with an LLM agent
  # + tools so intent classification is end-to-end, not a keyword list.
  escape_keywords:
    - 問症
    - 跳過
    - QNA
    - 不要
    - 唔要
    - 唔好
    - 唔使
    - 算啦
    - 算咗
    - 取消
    - 停
    - 離開
    - 退出
    - 走
    - "no"
    - "no thanks"
    - "stop"
    - "cancel"
    - "quit"
    - "exit"
  language: cantonese

  doctor:
    name_zh: 洪醫師               # Casual 口語 — full name 洪煊宜 Jessica
    name_full_zh: 洪煊宜 Jessica
    photo_url: /static/sales/hong_doctor.jpg

  clinic_brand:
    name_zh: 心宜中醫
    name_en: Care Plus TCM
    booking_url: https://careplustcm.com/booking
    instagram: https://www.instagram.com/careplustcm

# ── Step sequence ──────────────────────────────────────────────────────
# Each step has: id, action, next (or null=end), and optional script(_template).
# flow_engine.advance() consumes these and returns the next patient-facing reply.

steps:
  - id: step_1_greeting
    action: send_text
    image_ref: doctor_photo        # Bundled with text → one WhatsApp bubble
    script_template: |
      你好 🌿 我係 {doctor_name_full_zh}，{clinic_brand_zh}嘅註冊中醫師 👩‍⚕️
      請問你邊度唔舒服？
    await: text_answer             # Wait for user to describe symptom
    retry_script: 同我講講你邊度唔舒服就得，例如「頭痛」、「成日攰」之類 🙏
    next: step_3_ask_tongue

  - id: step_3_ask_tongue
    action: send_text
    script: |
      收到，多謝你分享 🙏
      中醫講究「望聞問切」，可唔可以影張條脷嘅相俾我睇睇？ 👅
    await: image_attachment
    retry_script: 我仲未收到相片喎，方便再影一次？ 🙏
    next: step_4_tongue_analysis

  - id: step_4_tongue_analysis
    action: analyze_tongue
    script_template: |
      睇到你條脷 {tongue_summary} ，
      可能有少少「{suspected_signals}」嘅傾向。
    next: step_5_question_1

  - id: step_5_question_1
    action: send_text
    script: |
      我想問你 5 條問題，幫你分析下體質 🌿（一條一條問，逐條答就得）

      第一題：平時你係咪容易覺得攰、冇力？
      A. 係，好容易攰
      B. 中等，有時會
      C. 唔會，成日好精神
    await: text_answer
    next: step_6_question_2

  - id: step_6_question_2
    action: send_text
    script: |
      第二題：你平時係手腳凍、定容易口乾熱氣？

      A. 手腳凍、怕冷
      B. 唔凍唔熱，中間
      C. 容易口乾、熱氣
    await: text_answer
    next: step_7_constitution_result

  - id: step_7_constitution_result
    action: declare_constitution
    script_template: |
      根據你條脷同答案，你嘅體質傾向係：

      ✨ {constitution_zh}（{constitution_en}）

      特徵：{characteristics}

      ⚠️ 呢個只係初步傾向，唔係正式診斷。
      正式診斷需要中醫師面診 🙏
    next: step_8_product

  - id: step_8_product
    action: send_text
    image_ref: product_photo        # Bundled so the patient sees one branded bubble
    script_template: |
      我哋推薦一款 {product_name}，
      唔論咩體質都可以試下，幫身體補返啲根基 ✨

      {product_url}

      想了解多啲，或者想見醫師面診，繼續同我講 ❤️
    next: close_a_district

  - id: close_a_district
    action: send_text
    script: |
      你住邊區呀？我幫你搵最方便嘅安排 📍
    await: text_answer
    next: close_b_clinic

  - id: close_b_clinic
    action: match_clinic
    script_template: |
      {travel_hint}

      🏥 {clinic_name}（{clinic_brand_en}）
      📍 {clinic_address}
      ☎️ {clinic_phone}
      🕒 {clinic_hours}
    next: close_c_booking_date

  - id: close_c_booking_date
    action: propose_booking
    script_template: |
      我可以幫你排 {proposed_date}（星期{weekday}）{proposed_time} 睇{doctor_name_zh}，得唔得？

      回覆「確認」即刻訂位，
      或者話我知你想改第幾點鐘。
    await: confirmation_or_alternative
    next: close_d_confirmed

  - id: close_d_confirmed
    action: save_booking
    script_template: |
      搞掂！已為你預約 ✅

      🏥 {clinic_name}
      👩‍⚕️ {doctor_name_full_zh}
      📅 {proposed_date}（星期{weekday}）{proposed_time}
      📍 {clinic_address}
      ☎️ {clinic_phone}

      到時見 🌿
      網上改期/取消：{booking_url}
    next: null

