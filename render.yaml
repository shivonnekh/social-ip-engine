# Render deployment for social-ip-engine (formerly TCM-Jessica).
# NOTE: service renamed in dashboard 2026-07-03; public URL remains
# https://tcm-jessica.onrender.com (subdomain is fixed at creation —
# will be superseded by a custom domain later).
# NOTE: this service is NOT attached to a Render blueprint (verified
# 2026-07-03 via API) — this yaml is documentation + bootstrap only;
# live env vars are managed in the dashboard.
#
# Free plan with keep-alive ping:
#   - Free web service ($0/month) + free Postgres ($0/month, 1GB, persistent).
#   - Web service sleeps after 15 min idle → ~30-60s cold-start on first request.
#   - Combine with a free external cron (cron-job.org, every 10 min) hitting
#     /health to prevent sleep. See docs/DEPLOYMENT.md.

# ⚠️ NO databases: section on purpose. The original blueprint-declared
# free Postgres (tcm-jessica-db) hit its 90-day free-tier expiry on
# 2026-06-20 and was deleted by Render. Its manually-created replacement
# is **tcm-jessica-db-2** (created 2026-06-26, dashboard-managed, NOT in
# this yaml). From ~06-20 to 07-10 the service silently ran on SQLite on
# the EPHEMERAL disk because DATABASE_URL still pointed (via
# fromDatabase) at the dead db — every deploy wiped ALL CRM state +
# webhook dedup claims, causing the "old comment→DM replies re-sent
# after every deploy" incident (found 2026-07-10). Free Postgres expires;
# if this ever recurs, check `render.com /v1/postgres` status FIRST.

services:
  - type: web
    name: social-ip-engine
    runtime: python
    region: singapore
    # Upgraded free → starter on 2026-06-03. Starter does not spin down,
    # so inbound WhatsApp webhooks are never dropped during a cold start
    # (free-tier cold starts were silently losing group messages).
    plan: starter

    buildCommand: pip install -e .

    startCommand: uvicorn src.web:app --host 0.0.0.0 --port $PORT

    # Render waits for 200 from this path before swapping to the new instance.
    healthCheckPath: /health

    envVars:
      # Force unbuffered stdout/stderr — Render captures print() via stdout,
      # buffer = invisible logs.
      - key: PYTHONUNBUFFERED
        value: "1"

      # ── App mode ────────────────────────────────────────────
      # APP_ENV=production forces webhook secret check (router.py refuses
      # to start without CHATDADDY_WEBHOOK_SECRET).
      - key: APP_ENV
        value: production

      - key: LOG_LEVEL
        value: INFO

      # ── LLM ─────────────────────────────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false   # set in Render dashboard

      # ── ChatDaddy IM ────────────────────────────────────────
      # All three required. Copy from dr-baba-agent's existing Render
      # environment so we re-use the same WhatsApp number / account.
      - key: CHATDADDY_REFRESH_TOKEN
        sync: false
      - key: CHATDADDY_ACCOUNT_ID
        sync: false
      - key: CHATDADDY_WEBHOOK_SECRET
        sync: false

      # ── WhatsApp: OFF — legacy business line discontinued (2026-07-03).
      # Hardcoded "false" so blueprint sync ENFORCES off (the same mechanism
      # that caused the IG_ENABLED outage now works in our favour).
      - key: WA_POLL_ENABLED
        value: "false"
      - key: BROADCAST_ENABLED
        value: "false"
      - key: WA_POLL_INTERVAL_S
        value: "5"
      - key: WA_BUBBLE_DELAY_MIN
        value: "2.5"
      - key: WA_BUBBLE_DELAY_MAX
        value: "6.0"

      # ── Order channel for Care Plus ─────────────────────────
      - key: ORDER_WHATSAPP
        value: "+85252417448"

      # ── Group-chat identity ──────────────────────────────────
      # Jessica's own JID digits — used to detect @-mentions in group chats.
      # Same number as the ChatDaddy account (bot and order line share one WA number).
      - key: JESSICA_BOT_JID
        value: "85252417448"
      - key: JESSICA_BOT_NAMES
        value: "Jessica,jessica,Jessica姐"

      # ── Persistent Postgres ──────────────────────────────────
      # repo_factory.py reads DATABASE_URL first → uses CRMRepoPG; when it
      # is missing/empty it SILENTLY falls back to SQLite on the ephemeral
      # disk — which is exactly what happened 2026-06-20→07-10 when the
      # original linked db expired (see the databases: note at the top).
      # sync:false — the value is the tcm-jessica-db-2 internal connection
      # string, set in the dashboard/API (2026-07-10). NEVER wire this via
      # fromDatabase again unless the referenced db is blueprint-managed
      # and its expiry is monitored.
      - key: DATABASE_URL
        sync: false

      # ── Trace bundles — ephemeral on free plan ───────────────
      # Trace JSON files live in /tmp/traces and are lost on restart.
      # CRM data (users, messages, appointments) is safe in Postgres.
      - key: TRACE_DIR
        value: /tmp/traces

      # ── TTS / voice output (MiniMax) ─────────────────────────
      # Match-modality: Jessica voice-replies only when the inbound
      # turn included a voice note. Opt-in via TTS_ENABLED=true.
      # Audio files cached under data/media/tts/ (ephemeral on free plan
      # — that's OK, MiniMax cache rebuilds on demand).
      - key: TTS_ENABLED
        value: "false"   # flip to "true" after MINIMAX_* secrets are set
      - key: MINIMAX_API_KEY
        sync: false
      - key: MINIMAX_GROUP_ID
        sync: false
      - key: MINIMAX_TTS_VOICE
        value: Cantonese_KindWoman
      # Absolute URL so ChatDaddy can fetch the generated audio file.
      - key: JESSICA_BASE_URL
        value: https://tcm-jessica.onrender.com

      # ── Meta channels: Instagram + Facebook (Graph API) ──────
      # Both share ONE Meta App ⇒ ONE app secret + verify token.
      # Webhook URLs to register with Meta:
      #   IG: https://tcm-jessica.onrender.com/webhook/instagram
      #   FB: https://tcm-jessica.onrender.com/webhook/facebook
      #
      # App secret — verifies X-Hub-Signature-256 on every inbound webhook.
      - key: META_APP_SECRET
        sync: false
      # Verify token — you choose this string; paste the SAME value into
      # Meta's webhook "Verify Token" field during the GET handshake.
      - key: META_VERIFY_TOKEN
        sync: false

      # ── Instagram ──
      # sync:false (NOT a hardcoded value) — this MUST be dashboard-managed.
      # Render blueprint syncs re-apply a literal `value:` on every deploy,
      # silently overwriting any manual dashboard change. This var was
      # hardcoded "false" here since it was first added, so every deploy
      # (we did 5 today) reset it back to disabled regardless of what was
      # set in the dashboard — real comments/DMs arrived and were silently
      # dropped (200 OK to Meta, zero processing) with no error anywhere.
      # Set the actual value ("true"/"false") in the Render dashboard only.
      - key: IG_ENABLED
        sync: false
      - key: IG_PAGE_ACCESS_TOKEN
        sync: false
      - key: IG_USER_ID          # IG professional account id (Send API target)
        sync: false

      # Profile-pipeline feature flag (meta_webhook.py::_dispatch_dm) —
      # comma-separated IG/FB business account ids that should route
      # through the profile-driven JessicaPipeline (Planner -> Specialists
      # -> Writer, KB-grounded) instead of ChloeAgent's single-LLM-call
      # model. Any account NOT listed here keeps today's ChloeAgent
      # behavior unchanged. On ANY failure in the new path (exception,
      # unmapped account) the turn falls back to ChloeAgent automatically
      # — this flag only ever adds a path, never removes the safety net.
      # Empty/unset (the default) = zero risk, identical to pre-migration
      # behavior for every account.
      # To activate for Jackie (jackiechan.tcm, IG id 17841417304649448),
      # set this to "17841417304649448" in the Render dashboard.
      - key: SOCIAL_PIPELINE_ACCOUNTS
        sync: false

      # ── Facebook Page ──
      # sync:false — same reasoning as IG_ENABLED above: must be
      # dashboard-managed so a deploy never silently resets it.
      - key: FB_ENABLED
        sync: false
      - key: FB_PAGE_ACCESS_TOKEN
        sync: false
      - key: FB_PAGE_ID          # Facebook Page id (Send API target)
        sync: false

      # Comment→DM CTA rules (keyword → fixed DM). Canned-first: a keyword
      # match sends predefined content, NO LLM call, unless the rule sets
      # "use_agent": true. Edit data/channels/comment_responses.json.
      - key: COMMENT_RESPONSES_PATH
        value: data/channels/comment_responses.json

      # ── Notion auto-sync (POST /admin/notion-sync) ───────────
      # Notion Automation calls this when a Production Tracker row's Stage
      # flips to "✅ Published" — drafts + wires the row's CTA keyword into
      # comment_responses.json immediately, no redeploy needed.
      # NOTION_KEY: same integration token used by ai-tcm-ip's Notion board.
      - key: NOTION_KEY
        sync: false
      # NOTION_SYNC_SECRET: any random string YOU invent. Paste the SAME
      # value into the Notion Automation's webhook custom header
      # (X-Sync-Secret). Endpoint returns 401 without a matching value.
      - key: NOTION_SYNC_SECRET
        sync: false
      # GITHUB_PUSH_TOKEN: fine-grained GitHub PAT, Contents:write scope on
      # shivonnekh/TCM-Jessica ONLY. Lets the sync persist new rules back to
      # git so they survive the next deploy (the in-memory write already
      # takes effect immediately without this — this is durability, not
      # correctness). Omit and the sync still works, just non-durable.
      - key: GITHUB_PUSH_TOKEN
        sync: false

      # ── Ops alerting (src/ops_alert.py) ──────────────────────
      # Built after the 2026-07-06/07 anxiety-comment incident: logging a
      # drop isn't enough if nobody's watching the logs. Paste a Slack
      # "Incoming Webhook" URL (or any endpoint accepting POST {"text":..})
      # here to get pinged when: (a) IG/FB webhook is disabled and dropping
      # everything, or (b) a comment is dropped even after the Graph API
      # backfill fetch. sync:false — same reasoning as every other
      # dashboard-managed secret above. Until this is set, the code path is
      # still live — it just no-ops (logs only), so this is safe to leave
      # unset and fill in whenever.
      - key: OPS_ALERT_WEBHOOK_URL
        sync: false
      - key: OPS_ALERT_COOLDOWN_S
        value: "1800"   # 30 min — collapses a burst of the same failure into one alert

      # ── IG comment reconciliation sweep (src/channels/reconciliation.py) ──
      # Defense-in-depth backstop, independent of any specific bug: re-derives
      # "what comments exist on our recent posts" from the Graph API on a
      # schedule and replays anything not yet handled through the SAME
      # handle_comment() used by the live webhook (DB-backed dedup makes
      # replaying an already-handled comment a safe no-op, never a duplicate
      # send). Defaults to ON — this is a new safety net, not a manual
      # dashboard toggle with prior state to protect, so a plain `value:` is
      # fine here (unlike IG_ENABLED/FB_ENABLED above).
      - key: RECONCILE_ENABLED
        value: "true"
      - key: RECONCILE_INTERVAL_S
        value: "14400"  # 4 hours
      - key: RECONCILE_LOOKBACK_H
        value: "72"     # only re-check posts from the last 3 days
      - key: RECONCILE_MEDIA_LIMIT
        value: "10"     # cap Graph API calls per account per cycle

      # ── Notion publish-date schedule sweep (src/notion_publish_scheduler.py) ──
      # The live "go live" trigger (POST /admin/notion-publish) is SUPPOSED
      # to be event-driven — a Notion Automation calls it the instant Stage
      # flips to "✅ Published". notion_publish.py also respects an optional
      # "Publish Date" property, deferring a row whose date hasn't arrived
      # yet — but a deferred row has no future Stage-change event to
      # re-trigger it. This loop is that missing "somebody checks back":
      # once a day at NOTION_PUBLISH_SCHEDULE_HOUR_HKT:MINUTE_HKT, it calls
      # the SAME dispatch path as the live webhook. Default OFF — unlike
      # RECONCILE_ENABLED above, this can create a REAL, irreversible new
      # Instagram post, so a human should opt in deliberately rather than
      # get it for free on the next deploy. sync:false so a dashboard "on"
      # decision is never silently reset by a blueprint sync (same
      # reasoning as IG_ENABLED/FB_ENABLED elsewhere in this file).
      - key: NOTION_PUBLISH_SCHEDULE_ENABLED
        sync: false
      - key: NOTION_PUBLISH_SCHEDULE_HOUR_HKT
        value: "9"      # 0-23, Asia/Hong_Kong time
      - key: NOTION_PUBLISH_SCHEDULE_MINUTE_HKT
        value: "0"      # 0-59
      # Root-caused 2026-07-21: the Notion Automation above was found NOT
      # firing at all in production (checked live server access logs for a
      # >1hr window after a Stage flip — zero requests to any /admin/*
      # endpoint). Notion's public API doesn't expose Automations for
      # inspection/repair, so this interval is the self-contained fix —
      # when set, the daily-fixed-hour behavior above is replaced with a
      # short fixed-cadence check instead, so "the button works" no longer
      # depends on that automation staying correctly wired. Unset (the
      # blueprint default) = original once-daily behavior. sync:false,
      # same reasoning as ENABLED above — this is an operational dial, not
      # a fixed constant, and must never be silently reset by a sync.
      - key: NOTION_PUBLISH_SCHEDULE_INTERVAL_S
        sync: false

      # ── Notion sync (Ready-to-Publish DM-rule) interval-poll fallback ──
      # (src/notion_sync_scheduler.py) — same root cause and same fix as
      # NOTION_PUBLISH_SCHEDULE_INTERVAL_S above, but for POST
      # /admin/notion-sync (drafts the comment-keyword DM rule at "🟢 Ready
      # to Publish") rather than /admin/notion-publish. Default OFF; when
      # ENABLED, checks Notion every NOTION_SYNC_SCHEDULE_INTERVAL_S seconds
      # (default 120 if unset) regardless of whether the Notion Automation
      # itself is firing. sync:false on both — operational dials, not fixed
      # constants, must never be silently reset by a blueprint sync (same
      # reasoning as IG_ENABLED/FB_ENABLED elsewhere in this file).
      - key: NOTION_SYNC_SCHEDULE_ENABLED
        sync: false
      - key: NOTION_SYNC_SCHEDULE_INTERVAL_S
        sync: false
